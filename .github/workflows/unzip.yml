name: Unzip Project

on:
  push

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extract ZIP
        run: |
          unzip ai-agency-ghpages.zip -d temp
          rsync -av temp/ ./
          rm -rf temp ai-agency-ghpages.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto unzip project"
          git push
